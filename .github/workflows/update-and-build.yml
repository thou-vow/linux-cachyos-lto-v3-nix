name: Update flake and build cache
on:
  push:
  schedule:
    - cron: 0 */12 * * *
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: cache
jobs:
  update-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update flake
        id: update
        run: |
          nix flake update

          if git diff --quiet; then
            echo "Unchanged flake"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "Flake updated!"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: thou-vow-linux
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Build cache
        run: |
          cachix watch-exec -l16 thou-vow-linux -- \
            nix run --inputs-from . nixpkgs#nix-fast-build -- \
            --no-nom --no-link --skip-cached --fail-fast --flake .#packages.x86_64-linux.default

      - name: Make commit
        if: steps.update.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): bump flake to $(date +%Y-%m-%dT%H:%MZ)"
          git pull --rebase
          git push
